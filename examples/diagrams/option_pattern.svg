<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 18px; font-weight: 600; fill: #1a1a1a; }
      .section-title { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 14px; font-weight: 600; fill: #424242; }
      .text { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 12px; fill: #333; }
      .code { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 11px; fill: #1a1a1a; }
      .confidence { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 11px; font-weight: 600; }
      .high-conf { fill: #2e7d32; }
      .pattern-box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
      .decision-box { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Header -->
  <rect width="800" height="60" fill="#f5f5f5"/>
  <text x="20" y="35" class="title">Pattern Analysis: Option&lt;T&gt; Matching</text>
  
  <!-- Pattern Detection -->
  <text x="20" y="90" class="section-title">📋 Detected Patterns</text>
  
  <rect x="20" y="100" width="760" height="80" class="pattern-box" rx="4"/>
  <text x="35" y="125" class="text" font-weight="600">Option&lt;T&gt; Exhaustive Match</text>
  <text x="35" y="145" class="code">Lines 2-11 | Confidence: </text>
  <text x="220" y="145" class="confidence high-conf">85%</text>
  <text x="35" y="165" class="text" font-size="11px">Covers both Some(value) and None branches with additional</text>
  <text x="35" y="180" class="text" font-size="11px">conditional logic inside Some arm</text>
  
  <!-- Decision Tree -->
  <text x="20" y="210" class="section-title">🌳 Decision Flow</text>
  
  <rect x="20" y="220" width="360" height="70" class="decision-box" rx="4"/>
  <text x="35" y="245" class="text" font-weight="600">Branch 1: Some(text)</text>
  <text x="35" y="265" class="code">→ Check if text.is_empty()</text>
  <text x="35" y="280" class="code">→ Return formatted string or empty message</text>
  
  <rect x="420" y="220" width="360" height="70" class="decision-box" rx="4"/>
  <text x="435" y="245" class="text" font-weight="600">Branch 2: None</text>
  <text x="435" y="265" class="code">→ Return "No input provided"</text>
  
  <!-- Metadata -->
  <text x="20" y="320" class="text" fill="#757575" font-size="10px">Analysis Type: Exhaustive Pattern Matching</text>
  <text x="20" y="340" class="text" fill="#757575" font-size="10px">Pattern Complexity: Medium (nested conditional in Some arm)</text>
  <text x="20" y="360" class="text" fill="#757575" font-size="10px">Generated by rust-pattern-viz</text>
</svg>
