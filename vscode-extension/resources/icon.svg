<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Rust gear background -->
  <circle cx="64" cy="64" r="60" fill="#CE422B"/>
  <circle cx="64" cy="64" r="52" fill="#000000"/>
  
  <!-- Pattern matching visualization -->
  <g transform="translate(64, 64)">
    <!-- Diamond (pattern match) -->
    <path d="M 0,-25 L 15,0 L 0,25 L -15,0 Z" fill="#F74C00" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Success branch -->
    <line x1="15" y1="0" x2="35" y2="0" stroke="#4CAF50" stroke-width="2"/>
    <rect x="35" y="-8" width="16" height="16" rx="2" fill="#4CAF50"/>
    
    <!-- Failure branch -->
    <line x1="-15" y1="0" x2="-35" y2="0" stroke="#F44336" stroke-width="2"/>
    <rect x="-51" y="-8" width="16" height="16" rx="2" fill="#F44336"/>
  </g>
  
  <!-- Decorative cog teeth (Rust theme) -->
  <g fill="#CE422B">
    <rect x="58" y="4" width="12" height="8"/>
    <rect x="58" y="116" width="12" height="8"/>
    <rect x="4" y="58" width="8" height="12"/>
    <rect x="116" y="58" width="8" height="12"/>
  </g>
</svg>
