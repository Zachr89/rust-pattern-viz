[package]
name = "rust-pattern-viz"
version = "0.1.0"
edition = "2021"

[dependencies]
syn = { version = "2.0", features = ["full", "visit", "extra-traits"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
chrono = "0.4"
tower-lsp = "0.20"
tokio = { version = "1.35", features = ["full"] }
sha2 = "0.10"
warp = "0.3"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"

[dev-dependencies]
tempfile = "3.8"

[[bin]]
name = "rpv"
path = "src/main.rs"

[[bin]]
name = "rpv-lsp"
path = "src/lsp_server.rs"

[[bin]]
name = "rpv-share-server"
path = "src/bin/share_server.rs"

[lib]
crate-type = ["cdylib", "rlib"]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
