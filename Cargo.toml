[package]
name = "rust-pattern-viz"
version = "0.1.0"
edition = "2021"
authors = ["Developer <dev@example.com>"]
description = "Visualize AI-generated Rust code patterns and decision trees"
license = "MIT"
repository = "https://github.com/yourusername/rust-pattern-viz"
keywords = ["rust", "ai", "visualization", "code-analysis", "developer-tools"]
categories = ["development-tools", "visualization"]

[[bin]]
name = "rpv"
path = "src/main.rs"

[[bin]]
name = "rpv-lsp"
path = "src/lsp_server.rs"

[dependencies]
syn = { version = "2.0", features = ["full", "parsing", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.5", features = ["derive", "color"] }
anyhow = "1.0"
colored = "2.1"
askama = "0.12"
regex = "1.10"
walkdir = "2.5"
sha2 = "0.10"
tower-lsp = "0.20"
tokio = { version = "1.36", features = ["full"] }
chrono = "0.4"

[dev-dependencies]
tempfile = "3.10"
assert_cmd = "2.0"
predicates = "3.1"
